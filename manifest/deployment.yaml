apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake-classic
  labels:
    app: snake-classic
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snake-classic
  template:
    metadata:
      labels:
        app: snake-classic
    spec:
      containers:
        - name: snake-classic
          image: silvemerson/snake-classic:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
